<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Cover Letter</title>
  <style>
    @font-face {
      font-family: "Space Grotesk";
      font-weight: 400;
      src: url("fonts/SpaceGrotesk-Regular.woff2") format("woff2");
    }
    @font-face {
      font-family: "Space Grotesk";
      font-weight: 700;
      src: url("fonts/SpaceGrotesk-Bold.woff2") format("woff2");
    }
    @font-face {
      font-family: "DM Sans";
      font-weight: 400;
      src: url("fonts/DMSans-Regular.woff2") format("woff2");
    }
    @font-face {
      font-family: "DM Sans";
      font-weight: 700;
      src: url("fonts/DMSans-Bold.woff2") format("woff2");
    }
    @page {
      size: A4;
      margin: 0.75in;
      @bottom-right {
        content: counter(page);
        font-family: "DM Sans", sans-serif;
        font-size: 8pt;
        color: #787774;
      }
    }
    html, body {
      margin: 0;
      padding: 0;
      font-family: "DM Sans", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 11pt;
      color: #37352f;
      line-height: 1.55;
    }
    h1 {
      font-family: "Space Grotesk", sans-serif;
      font-size: 18pt;
      margin: 0 0 4pt 0;
      color: #37352f;
    }
    h2 {
      font-family: "Space Grotesk", sans-serif;
      font-size: 12pt;
      margin: 14pt 0 4pt 0;
    }
    p {
      margin: 0 0 10pt 0;
    }
    a {
      color: #2383e2;
      text-decoration: none;
    }
  </style>
</head>
<body>
  {{ body | safe }}
</body>
</html>
