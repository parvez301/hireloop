name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hireloop_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install WeasyPrint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcairo2 libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b libfontconfig1 shared-mime-info
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-extras --dev
      - name: Lint (ruff)
        working-directory: backend
        run: uv run ruff check src/ tests/
      - name: Format check (black)
        working-directory: backend
        run: uv run black --check src/ tests/
      - name: Type check (mypy)
        working-directory: backend
        run: uv run mypy src/
      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/hireloop_test
        run: uv run alembic upgrade head
      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/hireloop_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
          COGNITO_USER_POOL_ID: us-east-1_test
          COGNITO_CLIENT_ID: testclient
          COGNITO_REGION: us-east-1
          COGNITO_JWKS_URL: http://localhost/jwks
          ANTHROPIC_API_KEY: test-key
        run: uv run pytest -v --cov=hireloop --cov-report=xml

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build workspaces
        run: pnpm -r build

  js-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Test user-portal (Vitest)
        working-directory: user-portal
        run: pnpm test

  cdk-synth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: CDK synth
        working-directory: infrastructure/cdk
        env:
          CI: "true"
        run: pnpm run synth
