version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hireloop
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Inngest dev server (Phase 2c). On default `docker compose up` so scan/batch workers work locally.
  inngest:
    image: inngest/inngest:latest
    ports: ["8288:8288"]
    command: inngest dev -u http://host.docker.internal:8000/api/v1/inngest
    extra_hosts:
      - host.docker.internal:host-gateway

  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
    volumes:
      - localstack_data:/var/lib/localstack

  pdf-render:
    build:
      context: ./pdf-render
      dockerfile: Dockerfile
    environment:
      PORT: 4000
      PDF_RENDER_API_KEY: local-dev-key
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: hireloop-dev-assets
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    ports:
      - "4000:4000"
    depends_on:
      - localstack

volumes:
  postgres_data:
  localstack_data:
